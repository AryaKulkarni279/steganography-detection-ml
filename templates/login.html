<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStego - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Basic body styling for login page */
        body.login-page {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6; /* Light gray background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* Style for the logo text */
        .login-logo-text {
             font-size: 2rem; /* Larger logo text */
             font-weight: 700;
             color: #333; /* Darker text */
             letter-spacing: 1px; /* Slight letter spacing */
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container card-shadow"> <div class="login-header">
            <span class="login-logo-text">🔒 CyberStego</span>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-error">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <input type="text" name="username" class="login-input" placeholder="Username" required>
            <input type="password" name="password" class="login-input" placeholder="Password" required>
            <button type="submit" class="login-button primary">Login</button>
            </form> <div style="margin-top: 1rem; font-size: 0.9rem;">
             Don't have an account? <a href="{{ url_for('register') }}" style="color: #4F46E5; font-weight: 500;">Register here</a>
        </div>
    </div>
</body>
</html>
